<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulador de Vuelos</title>
  <meta name="description" content="Simulador de vuelos interactivo. Buscá destinos, elegí tu fecha y guardá tus reservas." />
  <meta name="author" content="Ulises" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <span class="logo">✈ SKYBOOK</span>
      <p class="tagline">Entrega final JS</p>
    </div>
  </header>

  <main>

    <!-- PANEL IZQUIERDO: Formulario -->
    <section class="panel panel-form">
      <h2>Reservá tu vuelo</h2>

      <div class="campo">
        <label for="nombre">Nombre del pasajero</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" />
      </div>

      <div class="campo">
        <label for="origen">Origen</label>
        <select id="origen">
          <option value="">-- Seleccioná un origen --</option>
          <optgroup label="🇦🇷 Argentina">
            <option value="EZE">Buenos Aires — Ezeiza (EZE)</option>
            <option value="AEP">Buenos Aires — Aeroparque (AEP)</option>
            <option value="COR">Córdoba — Ambrosio Taravella (COR)</option>
            <option value="MDZ">Mendoza — El Plumerillo (MDZ)</option>
            <option value="BRC">Bariloche — Teniente Candelaria (BRC)</option>
            <option value="ROS">Rosario — Islas Malvinas (ROS)</option>
            <option value="SLA">Salta — Martín Miguel de Güemes (SLA)</option>
          </optgroup>
          <optgroup label="🌎 Internacional">
            <option value="GRU">São Paulo — Guarulhos (GRU)</option>
            <option value="SCL">Santiago de Chile — Arturo Merino (SCL)</option>
            <option value="MIA">Miami — Miami Intl. (MIA)</option>
            <option value="MAD">Madrid — Adolfo Suárez Barajas (MAD)</option>
          </optgroup>
        </select>
      </div>

      <div class="campo">
        <label for="destino">Destino</label>
        <select id="destino">
          <option value="">-- Seleccioná un destino --</option>
          <optgroup label="🇦🇷 Argentina">
            <option value="EZE">Buenos Aires — Ezeiza (EZE)</option>
            <option value="AEP">Buenos Aires — Aeroparque (AEP)</option>
            <option value="COR">Córdoba — Ambrosio Taravella (COR)</option>
            <option value="MDZ">Mendoza — El Plumerillo (MDZ)</option>
            <option value="BRC">Bariloche — Teniente Candelaria (BRC)</option>
            <option value="ROS">Rosario — Islas Malvinas (ROS)</option>
            <option value="SLA">Salta — Martín Miguel de Güemes (SLA)</option>
          </optgroup>
          <optgroup label="🌎 Internacional">
            <option value="GRU">São Paulo — Guarulhos (GRU)</option>
            <option value="SCL">Santiago de Chile — Arturo Merino (SCL)</option>
            <option value="MIA">Miami — Miami Intl. (MIA)</option>
            <option value="MAD">Madrid — Adolfo Suárez Barajas (MAD)</option>
          </optgroup>
        </select>
      </div>

      <div class="campo">
        <label for="fecha">Fecha de vuelo</label>
        <select id="fecha">
          <option value="">-- Seleccioná una fecha --</option>
          <option value="15/04/2025">15/04/2025</option>
          <option value="22/04/2025">22/04/2025</option>
          <option value="30/04/2025">30/04/2025</option>
        </select>
      </div>

      <div class="botones">
        <button id="btn-buscar">Buscar vuelo</button>
        <button id="btn-limpiar" class="secundario">Limpiar</button>
      </div>

      <div id="mensaje" class="mensaje oculto"></div>

      <!-- Resultado del vuelo encontrado -->
      <div id="resultado-vuelo" class="tarjeta-vuelo oculto">
        <p class="tarjeta-titulo">VUELO ENCONTRADO</p>
        <div id="info-vuelo"></div>
        <button id="btn-reservar">Confirmar reserva ✓</button>
      </div>
    </section>

    <!-- PANEL DERECHO: Historial -->
    <section class="panel panel-historial">
      <div class="historial-header">
        <h2>Mis reservas</h2>
        <button id="btn-borrar-todo" class="danger">Borrar todo</button>
      </div>
      <div id="lista-reservas">
        <p class="vacio">Aún no tenés reservas guardadas.</p>
      </div>
    </section>

  </main>

  <script src="js/simulador.js"></script>
</body>
</html>
